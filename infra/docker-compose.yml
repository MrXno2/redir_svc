services:
  redis:
    image: redis:8.8.0-alpine
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file:
      - ../backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: ../backend
      target: production
    env_file:
      - ../backend/.env
    environment:
      - REDIS_HOST=redis
      - POSTGRES_IP=db
    volumes:
      - ../logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: infra/nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
