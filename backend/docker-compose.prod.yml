services:
  redis:
    image: redis:8.8.0-alpine

    ports:
      - "6379:6379"

    restart: unless-stopped

  db:
    image: postgres:16-alpine

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

  app:
    build:
      context: .
      target: production

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

    ports:
      - "8080:8080"

    volumes:
      - ./logs:/app/logs

    restart: unless-stopped

volumes:
  postgres_data: