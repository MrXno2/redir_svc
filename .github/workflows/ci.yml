name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env
        run: cp .env.example .env

      - name: Build images
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml build

      - name: Start infrastructure
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d db redis

      - name: Ruff
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm test ruff check .

      - name: Pytest
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm test pytest

      - name: Shutdown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v